<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SonicVault - A Progressive Web App for saving YouTube music for offline listening">
    <meta name="theme-color" content="#7c3dff">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <title>SonicVault - Offline Music PWA</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #151520;
            --bg-tertiary: #1a1a2e;
            --accent-primary: #7c3dff;
            --accent-secondary: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --success: #00ff88;
            --warning: #ffaa00;
            --error: #ff4444;
            --glass: rgba(21, 21, 32, 0.8);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(124, 61, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
        
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(124, 61, 255, 0.2);
            padding: 1rem 1.5rem;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 0.875rem;
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        
        .connection-status.online { border-color: var(--success); color: var(--success); }
        .connection-status.offline { border-color: var(--warning); color: var(--warning); }
        
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        
        .search-section { margin-bottom: 2rem; }
        
        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: var(--bg-secondary);
            border: 2px solid rgba(124, 61, 255, 0.3);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(124, 61, 255, 0.2);
        }
        
        .search-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: transform 0.2s;
        }
        
        .search-btn:hover { transform: translateY(-50%) scale(1.05); }
        .search-btn:active { transform: translateY(-50%) scale(0.95); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--bg-tertiary);
            overflow-x: auto;
        }
        
        .tab {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            transition: color 0.3s;
        }
        
        .tab.active {
            color: var(--accent-primary);
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .video-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(124, 61, 255, 0.1);
            transition: all 0.3s;
        }
        
        .video-card:hover {
            transform: translateY(-4px);
            border-color: rgba(124, 61, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .video-card:hover .video-thumbnail img { transform: scale(1.05); }
        
        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        
        .video-card:hover .play-overlay { opacity: 1; }
        
        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        
        .play-overlay:hover .play-btn { transform: scale(1); }
        
        .video-info { padding: 1.25rem; }
        
        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-channel {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        
        .video-actions {
            display: flex;
            gap: 0.75rem;
        }
        
        .action-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid rgba(124, 61, 255, 0.3);
        }
        
        .action-btn:hover { transform: scale(1.02); }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.saved { background: var(--success); color: var(--bg-primary); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            width: 100%;
            max-width: 900px;
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .modal-close:hover { background: var(--error); }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        
        .video-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-title { font-size: 1.5rem; color: var(--text-primary); margin-bottom: 0.5rem; }
        
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 400px;
        }
        
        .toast {
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }
        .toast.warning { border-left-color: var(--warning); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .install-btn {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 61, 255, 0.4);
            transition: all 0.3s;
            display: none;
            z-index: 100;
        }
        
        .install-btn.visible { display: block; animation: bounceIn 0.5s ease; }
        
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .install-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(124, 61, 255, 0.5);
        }
        
        .hidden { display: none !important; }
        
        .instance-selector {
            background: var(--bg-secondary);
            border: 1px solid rgba(124, 61, 255, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .instance-selector label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .instance-selector select {
            background: var(--bg-primary);
            border: 1px solid rgba(124, 61, 255, 0.3);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .content-grid { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <div class="header-content">
            <div class="logo">
                <span style="font-size: 2rem;">🎵</span>
                SonicVault
            </div>
            <div class="status-bar">
                <div class="connection-status online" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span id="statusText">Online</span>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="instance-selector">
            <label>🌐 Piped Instance:</label>
            <select id="instanceSelect">
                <option value="https://pipedapi.kavin.rocks">pipedapi.kavin.rocks (Default)</option>
                <option value="https://api.piped.projectsegfault.com">projectsegfault.com</option>
                <option value="https://pipedapi.moomoo.me">moomoo.me</option>
                <option value="https://pipedapi.adminforge.de">adminforge.de</option>
                <option value="https://api.piped.privacydev.net">privacydev.net</option>
            </select>
            <span style="color: var(--text-secondary); font-size: 0.875rem; margin-left: auto;">
                No API key needed • Privacy-friendly
            </span>
        </div>
        
        <section class="search-section">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for music...">
                <button class="search-btn" id="searchBtn" onclick="performSearch()">🔍</button>
            </div>
        </section>
        
        <nav class="tabs">
            <button class="tab active" data-tab="search" onclick="switchTab('search')">Search Results</button>
            <button class="tab" data-tab="library" onclick="switchTab('library')">My Library</button>
        </nav>
        
        <main id="contentArea">
            <div class="content-grid" id="videoGrid"></div>
        </main>
    </div>
    
    <div class="modal" id="playerModal" onclick="closePlayer(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closePlayer()">×</button>
            <div class="video-container" id="videoContainer"></div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    <button class="install-btn" id="installBtn" onclick="installApp()">📲 Install App</button>

    <script>
        // Configuration
        const DB_NAME = 'SonicVaultDB_v1';
        const DB_VERSION = 1;
        
        // Piped instances - these are public instances that provide CORS-friendly API
        const PIPED_INSTANCES = [
            'https://pipedapi.kavin.rocks',
            'https://api.piped.projectsegfault.com',
            'https://pipedapi.moomoo.me',
            'https://pipedapi.adminforge.de',
            'https://api.piped.privacydev.net'
        ];
        
        let currentInstance = localStorage.getItem('pipedInstance') || PIPED_INSTANCES[0];
        let db;
        let currentTab = 'search';
        let searchResults = [];
        let savedSongs = [];
        
        // Initialize IndexedDB
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('songs')) {
                        const store = database.createObjectStore('songs', { keyPath: 'id' });
                        store.createIndex('savedAt', 'savedAt', { unique: false });
                    }
                };
            });
        };
        
        // Piped API Functions (No API key needed, CORS-friendly)
        const searchPiped = async (query) => {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            try {
                const response = await fetch(
                    `${currentInstance}/search?q=${encodeURIComponent(query)}&filter=music_songs`,
                    {
                        signal: controller.signal,
                        headers: {
                            'Accept': 'application/json'
                        }
                    }
                );
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Transform Piped data to our format
                return data.items.map(item => ({
                    id: item.url.split('v=')[1] || item.url.split('/').pop(),
                    title: item.title,
                    channel: item.uploaderName,
                    thumbnail: item.thumbnail,
                    duration: item.duration,
                    uploaded: item.uploaded,
                    views: item.views
                })).filter(item => item.id); // Only return items with valid IDs
            } catch (error) {
                if (error.name === 'AbortError') {
                    throw new Error('Search timed out. Try another instance.');
                }
                throw new Error('Search failed: ' + error.message);
            }
        };
        
        // Get video details from Piped
        const getVideoDetails = async (videoId) => {
            try {
                const response = await fetch(`${currentInstance}/streams/${videoId}`);
                if (!response.ok) throw new Error('Failed to fetch video details');
                return await response.json();
            } catch (error) {
                console.error('Error fetching video details:', error);
                return null;
            }
        };
        
        // Database Operations
        const loadSavedSongs = async () => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['songs'], 'readonly');
                const store = transaction.objectStore('songs');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    savedSongs = request.result.sort((a, b) => b.savedAt - a.savedAt);
                    resolve(savedSongs);
                };
                request.onerror = () => reject(request.error);
            });
        };
        
        const saveSong = async (video) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['songs'], 'readwrite');
                const store = transaction.objectStore('songs');
                const song = { ...video, savedAt: Date.now() };
                const request = store.put(song);
                
                request.onsuccess = () => {
                    savedSongs.unshift(song);
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        };
        
        const removeSong = async (id) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['songs'], 'readwrite');
                const store = transaction.objectStore('songs');
                const request = store.delete(id);
                
                request.onsuccess = () => {
                    savedSongs = savedSongs.filter(s => s.id !== id);
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        };
        
        const isSongSaved = (id) => savedSongs.some(s => s.id === id);
        
        // UI Functions
        const renderVideos = (videos) => {
            const grid = document.getElementById('videoGrid');
            
            if (!videos || videos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎵</div>
                        <div class="empty-title">No songs found</div>
                        <p>Try searching for something else or check your library</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = videos.map(video => `
                <div class="video-card" data-id="${video.id}">
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%231a1a2e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 font-size=%2240%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>🎵</text></svg>'">
                        <div class="play-overlay" onclick="playVideo('${video.id}')">
                            <div class="play-btn">▶</div>
                        </div>
                        ${video.duration ? `<div style="position: absolute; bottom: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.8); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">${formatDuration(video.duration)}</div>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-channel">${escapeHtml(video.channel)} ${video.views ? `• ${formatViews(video.views)} views` : ''}</div>
                        <div class="video-actions">
                            <button class="action-btn ${isSongSaved(video.id) ? 'saved btn-primary' : 'btn-secondary'}" 
                                    onclick="toggleSave('${video.id}', '${escapeHtml(video.title)}', '${escapeHtml(video.channel)}', '${video.thumbnail}')"
                                    ${!navigator.onLine && !isSongSaved(video.id) ? 'disabled' : ''}>
                                ${isSongSaved(video.id) ? '✓ Saved' : '💾 Save Offline'}
                            </button>
                            <button class="action-btn btn-primary" onclick="playVideo('${video.id}')">
                                ▶ Play
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        };
        
        const formatDuration = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };
        
        const formatViews = (views) => {
            if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views.toString();
        };
        
        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };
        
        const performSearch = async () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<div class="spinner"></div>';
            
            try {
                if (!navigator.onLine) {
                    showToast('You are offline. Showing saved songs only.', 'warning');
                    await loadSavedSongs();
                    renderVideos(savedSongs);
                    return;
                }
                
                searchResults = await searchPiped(query);
                renderVideos(searchResults);
                
                if (searchResults.length === 0) {
                    showToast('No results found. Try a different search term.', 'warning');
                }
            } catch (error) {
                showToast(error.message, 'error');
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-title">Search Failed</div>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="action-btn btn-primary" onclick="performSearch()" style="margin-top: 1rem;">Try Again</button>
                    </div>
                `;
            }
        };
        
        const switchTab = async (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            if (tab === 'library') {
                await loadSavedSongs();
                renderVideos(savedSongs);
            } else {
                if (searchResults.length > 0) {
                    renderVideos(searchResults);
                } else {
                    document.getElementById('videoGrid').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🔍</div>
                            <div class="empty-title">Search for music</div>
                            <p>Enter a song name above to find music</p>
                        </div>
                    `;
                }
            }
        };
        
        window.toggleSave = async (id, title, channel, thumbnail) => {
            const btn = document.querySelector(`[data-id="${id}"] .action-btn:first-child`);
            
            try {
                if (isSongSaved(id)) {
                    await removeSong(id);
                    btn.innerHTML = '💾 Save Offline';
                    btn.classList.remove('saved', 'btn-primary');
                    btn.classList.add('btn-secondary');
                    showToast('Removed from library', 'success');
                    if (currentTab === 'library') renderVideos(savedSongs);
                } else {
                    await saveSong({ id, title, channel, thumbnail });
                    btn.innerHTML = '✓ Saved';
                    btn.classList.remove('btn-secondary');
                    btn.classList.add('saved', 'btn-primary');
                    showToast('Saved for offline listening!', 'success');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        };
        
        window.playVideo = async (videoId) => {
            const container = document.getElementById('videoContainer');
            
            // Try to get Piped stream URL for better privacy
            try {
                const details = await getVideoDetails(videoId);
                if (details && details.videoStreams && details.videoStreams.length > 0) {
                    // Use Piped proxy for video playback (no ads, no tracking)
                    const streamUrl = details.videoStreams[0].url;
                    container.innerHTML = `
                        <video 
                            controls 
                            autoplay 
                            style="position: absolute; inset: 0; width: 100%; height: 100%;"
                            poster="${details.thumbnailUrl}"
                        >
                            <source src="${streamUrl}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    `;
                } else {
                    // Fallback to YouTube embed
                    container.innerHTML = `
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen
                            loading="lazy">
                        </iframe>
                    `;
                }
            } catch (error) {
                // Fallback to YouTube embed
                container.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        loading="lazy">
                    </iframe>
                `;
            }
            
            document.getElementById('playerModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        
        window.closePlayer = (event) => {
            if (!event || event.target.id === 'playerModal' || event.target.className === 'modal-close') {
                document.getElementById('playerModal').classList.remove('active');
                document.getElementById('videoContainer').innerHTML = '';
                document.body.style.overflow = '';
            }
        };
        
        const showToast = (message, type = 'info') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '⚠' : 'ℹ';
            toast.innerHTML = `<span>${icon}</span><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };
        
        // Connection Status
        const updateConnectionStatus = () => {
            const statusEl = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                statusEl.classList.remove('offline');
                statusEl.classList.add('online');
                statusText.textContent = 'Online';
            } else {
                statusEl.classList.remove('online');
                statusEl.classList.add('offline');
                statusText.textContent = 'Offline Mode';
                showToast('You are offline. Saved songs still available!', 'warning');
            }
        };
        
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.add('visible');
        });
        
        window.installApp = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBtn').classList.remove('visible');
                showToast('App installed successfully!', 'success');
            }
            deferredPrompt = null;
        };
        
        // Instance selector
        document.getElementById('instanceSelect').addEventListener('change', (e) => {
            currentInstance = e.target.value;
            localStorage.setItem('pipedInstance', currentInstance);
            showToast(`Switched to ${new URL(currentInstance).hostname}`, 'success');
        });
        
        // Set initial instance value
        document.getElementById('instanceSelect').value = currentInstance;
        
        // Service Worker Registration
        const registerSW = () => {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'sonicvault-v2';
                    const STATIC_ASSETS = [
                        '/',
                        '/index.html'
                    ];
                    
                    self.addEventListener('install', (event) => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then((cache) => {
                                return cache.addAll(STATIC_ASSETS);
                            })
                        );
                        self.skipWaiting();
                    });
                    
                    self.addEventListener('activate', (event) => {
                        event.waitUntil(self.clients.claim());
                    });
                    
                    self.addEventListener('fetch', (event) => {
                        const { request } = event;
                        if (request.method !== 'GET') return;
                        
                        // Don't cache API requests
                        if (request.url.includes('pipedapi') || request.url.includes('piped.')) {
                            return;
                        }
                        
                        event.respondWith(
                            caches.match(request).then((response) => {
                                if (response) return response;
                                return fetch(request).catch(() => {
                                    if (request.mode === 'navigate') {
                                        return caches.match('/index.html');
                                    }
                                });
                            })
                        );
                    });
                `;
                
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.error('SW registration failed:', err));
            }
        };
        
        // Event Listeners
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        // Initialize
        const init = async () => {
            await initDB();
            await loadSavedSongs();
            updateConnectionStatus();
            registerSW();
            
            // Load initial state
            document.getElementById('videoGrid').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🎵</div>
                    <div class="empty-title">Welcome to SonicVault</div>
                    <p>Search for music above or check your library</p>
                </div>
            `;
        };
        
        init();
    </script>
</body>
</html>
